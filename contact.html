<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - 同志社ワーキングコーラス (DWC)</title>
    <meta name="description" content="同志社ワーキングコーラス（DWC）へのお問い合わせページです。サークル活動に関するご質問等はこちらからお願いいたします。">
    <!-- Google Fonts: Inter and Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-container"></div>

    <main>
        <!-- Page Header -->
        <section class="page-header">
            <div class="container">
                <h1 class="page-title fade-in-up">お問い合わせ</h1>
            </div>
        </section>

        <!-- Main Content -->
        <section class="contact-section section-padding">
            <div class="container">
                
                <!-- Alert Banner -->
                <div class="alert-banner">
                    <div class="alert-icon">⚠️</div>
                    <div class="alert-content">
                        <h3 class="alert-title">ご注意：公募キャンプのお申し込みについて</h3>
                        <p class="alert-text">こちらはサークル全般に関するお問い合わせ窓口です。<br>公募キャンプの正式なお申し込みは、恐れ入りますが『キャンプ特設(公募)』ページ内の専用フォームよりお願いいたします。</p>
                        <a href="camp.html" class="btn-small btn-outline-alert">キャンプ特設(公募)ページへ</a>
                    </div>
                </div>

                <!-- Form Section -->
                <div class="form-container">
                    <div class="section-header">
                        <h2 class="section-title">Contact Form</h2>
                        <p class="section-subtitle">一般お問い合わせ窓口</p>
                    </div>
                    
                    <p class="form-note">※内容を確認次第、担当者よりご連絡いたします。返信には数日かかる場合がありますので、あらかじめご了承ください。</p>
                    
                    <!-- Google Form Placeholder -->
                    <div class="google-form-wrapper placeholder-form">
                        <div class="placeholder-form-content">
                            <span>Googleフォーム 埋め込みエリア<br>(プレースホルダー)</span>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="script.js"></script>
</body>
</html>
